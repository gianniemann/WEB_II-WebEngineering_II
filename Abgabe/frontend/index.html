<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GTC Sprint 02 Umsetzung</title>
        <link rel="stylesheet" href="styles_main.css">
        <script src="scripts/main.js"></script>
    </head>
    <body onload="init();">
        <main class="page">
            <header class="page-header">
                <h1>Global Travel Companion</h1>
                <p class="subtitle">Frontend mit REST-Anbindung.</p>
            </header>

            <section class="card">
                <h2>Status</h2>
                <div id="statusOutput" class="output"></div>
            </section>

            <section class="card">
                <h2>Currencies</h2>
                <div id="currenciesOutput"></div>
            </section>

            <section class="card">
                <h2>Rates</h2>
                <div id="ratesOutput"></div>
            </section>

            <section class="card">
                <h2>Calculator</h2>
                <div class="form-grid">
                    <div class="form-field">
                        <label for="sourceAmount">Betrag</label>
                        <input id="sourceAmount" type="number" value="100" step="0.01">
                    </div>
                    <div class="form-field">
                        <label for="sourceCurrency">Von</label>
                        <select id="sourceCurrency"></select>
                    </div>
                    <div class="form-field">
                        <label for="targetCurrency">Nach</label>
                        <select id="targetCurrency"></select>
                    </div>
                    <div class="form-field">
                        <button onclick="calculateAmount();">Berechnen</button>
                    </div>
                </div>
                <div id="calculatorOutput" class="output"></div>
            </section>

            <section class="card">
                <h2>Login</h2>
                <div class="form-grid">
                    <div class="form-field">
                        <label for="loginName">Login</label>
                        <input id="loginName" type="text" value="max">
                    </div>
                    <div class="form-field">
                        <label for="loginPassword">Passwort</label>
                        <input id="loginPassword" type="password" value="max123">
                    </div>
                    <div class="form-field">
                        <button onclick="doLogin();">Login</button>
                    </div>
                </div>
                <div id="loginOutput" class="output"></div>
            </section>

            <section class="card">
                <h2>Neue Transaktion</h2>
                <div class="form-grid">
                    <div class="form-field">
                        <label for="transactionUser">User Login</label>
                        <input id="transactionUser" type="text" value="max">
                    </div>
                    <div class="form-field">
                        <label for="transactionAmount">Betrag</label>
                        <input id="transactionAmount" type="number" value="100" step="0.01">
                    </div>
                    <div class="form-field">
                        <label for="transactionSourceCurrency">Von</label>
                        <select id="transactionSourceCurrency"></select>
                    </div>
                    <div class="form-field">
                        <label for="transactionTargetCurrency">Nach</label>
                        <select id="transactionTargetCurrency"></select>
                    </div>
                    <div class="form-field">
                        <label for="transactionRate">Kurs</label>
                        <input id="transactionRate" type="number" value="1.03" step="0.0001">
                    </div>
                    <div class="form-field">
                        <button onclick="createTransaction();">Speichern</button>
                    </div>
                </div>
                <div id="transactionFormOutput" class="output"></div>
            </section>

            <section class="card">
                <h2>Transactions</h2>
                <div id="transactionsOutput"></div>
            </section>
        </main>
    </body>
</html>
